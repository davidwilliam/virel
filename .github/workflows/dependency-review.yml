name: Dependency Review

# Fails a pull request that introduces a dependency with a known
# vulnerability or an incompatible license. Virel ships with zero runtime
# dependencies (SPEC 3); this gate keeps it that way and vets any that a
# change might add.

on:
  pull_request:

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: low
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
